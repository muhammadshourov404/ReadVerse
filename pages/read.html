<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Article - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/read.css">
</head>
    <!-- Progress bar (body-এর একদম উপরে) -->
<div id="read-progress-bar"></div>
<body>
    <div id="navbar-placeholder"></div>

    <main class="read-container" id="article-display">
        
        <div class="skeleton" style="height: 45px; width: 90%; margin-bottom: 25px;"></div>
        <div class="skeleton" style="height: 45px; width: 60%; margin-bottom: 25px;"></div>
        
        <div class="read-meta" style="border: none;">
            <div class="skeleton" style="width: 50px; height: 50px; border-radius: 50%;"></div>
            <div>
                <div class="skeleton" style="height: 20px; width: 150px; margin-bottom: 8px;"></div>
                <div class="skeleton" style="height: 15px; width: 100px;"></div>
            </div>
        </div>

        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 15px;"></div>
        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 15px;"></div>
        <div class="skeleton" style="height: 20px; width: 95%; margin-bottom: 15px;"></div>
        <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 30px;"></div>

    </main>

    <script src="../js/components.js"></script>
    <script type="module" src="../js/read.js"></script>

</html>
