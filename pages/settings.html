<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container settings-container">
        
        <aside class="settings-sidebar">
            <ul class="settings-menu">
                <li><a href="#" class="active"><i class="ph ph-user"></i> Account Info</a></li>
                <li><a href="#"><i class="ph ph-palette"></i> Appearance</a></li>
                <li><a href="#"><i class="ph ph-globe"></i> Language</a></li>
                <li><a href="#"><i class="ph ph-bell"></i> Notifications</a></li>
                <li><a href="#"><i class="ph ph-shield-check"></i> Security</a></li>
            </ul>
        </aside>

        <div class="settings-content">
            <h2 class="settings-section-title">Account Information</h2>
            
            <form id="profile-settings-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="settings-name" placeholder="Loading your name...">
                </div>
                
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="settings-bio" rows="4" placeholder="Loading your bio..."></textarea>
                </div>

                <h2 class="settings-section-title" style="margin-top: 40px;">Preferences</h2>
                
                <div class="form-group">
                    <label>Interface Language</label>
                    <select id="settings-language">
                        <option value="en">English (US)</option>
                        <option value="bn">Bengali (বাংলা)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Theme</label>
                    <select id="settings-theme">
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                        <option value="system">System Default</option>
                    </select>
                </div>

                <button type="submit" id="save-settings-btn" class="btn-save"><i class="ph ph-floppy-disk"></i> Save Changes</button>
            </form>
        </div>

    </main>

    <script src="../js/components.js"></script>
    <script type="module" src="../js/settings.js"></script>
</body>
</html>
