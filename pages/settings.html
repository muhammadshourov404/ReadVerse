<div class="container settings-container">

  <!-- ① Profile Section -->
  <section class="settings-section">
    <h3>Profile</h3>
    <div class="avatar-upload-row">
      <img id="avatar-preview" src="" alt="Avatar" class="settings-avatar-preview" />
      <div>
        <label class="btn-outline btn-sm" for="avatar-file-input">
          <i class="ph ph-upload-simple"></i> Change Photo
        </label>
        <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />
        <p class="text-secondary" style="font-size:0.8rem;margin-top:4px;">Max 2 MB · JPG, PNG, WebP</p>
      </div>
    </div>
    <input type="text" id="settings-fullname" placeholder="Full Name" class="form-input" />
    <textarea id="settings-bio" placeholder="Short bio (max 200 characters)" class="form-input" rows="3" maxlength="200"></textarea>
    <button id="save-profile-btn" class="btn-primary">
      <i class="ph ph-floppy-disk"></i> Save Profile
    </button>
  </section>

  <!-- ② Email Section -->
  <section class="settings-section">
    <h3>Change Email</h3>
    <input type="email"    id="settings-email"          placeholder="New Email Address" class="form-input" />
    <input type="password" id="email-confirm-password"  placeholder="Current Password (required)" class="form-input" />
    <button id="save-email-btn" class="btn-primary">
      <i class="ph ph-envelope"></i> Update Email
    </button>
  </section>

  <!-- ③ Password Section -->
  <section class="settings-section">
    <h3>Change Password</h3>
    <input type="password" id="current-password"      placeholder="Current Password"  class="form-input" />
    <input type="password" id="new-password"          placeholder="New Password"       class="form-input" />
    <input type="password" id="confirm-new-password"  placeholder="Confirm New Password" class="form-input" />
    <button id="save-password-btn" class="btn-primary">
      <i class="ph ph-lock-key"></i> Change Password
    </button>
  </section>

  <!-- ④ Appearance -->
  <section class="settings-section">
    <h3>Appearance</h3>
    <div class="settings-row">
      <label for="theme-toggle">Theme</label>
      <select id="theme-toggle" class="form-input" style="max-width:180px;">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="system">System Default</option>
      </select>
    </div>
  </section>

  <!-- ⑤ Notifications -->
  <section class="settings-section">
    <h3>Notifications</h3>
    <div class="settings-row">
      <label for="notif-email">Email notifications</label>
      <input type="checkbox" id="notif-email" class="settings-checkbox" />
    </div>
    <div class="settings-row">
      <label for="notif-push">Push notifications</label>
      <input type="checkbox" id="notif-push" class="settings-checkbox" />
    </div>
    <button id="save-notif-btn" class="btn-primary">
      <i class="ph ph-bell"></i> Save Preferences
    </button>
  </section>

  <!-- ⑥ Danger Zone -->
  <section class="settings-section settings-danger-zone">
    <h3>Danger Zone</h3>
    <p class="text-secondary">Permanently delete your account and all your articles. This cannot be undone.</p>
    <button id="delete-account-btn" class="btn-danger" style="padding:10px 20px;border-radius:var(--radius-md);cursor:pointer;font-weight:500;">
      <i class="ph ph-trash"></i> Delete My Account
    </button>
  </section>

</div>
