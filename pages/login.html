<!-- login.html -->
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <i class="ph ph-book-open-text auth-logo"></i>
      <h2>Welcome back</h2>
      <p>Sign in to continue reading and writing.</p>
    </div>

    <!-- Google Sign-In -->
    <button type="button" class="google-signin-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      Continue with Google
    </button>

    <div class="auth-divider">or</div>

    <!-- Email form -->
    <form id="login-form">
      <p class="auth-error"></p>

      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <i class="ph ph-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="ph ph-lock"></i>
          <input type="password" id="password" placeholder="Your password" required/>
          <button type="button" class="toggle-password"
                  onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'; this.querySelector('i').classList.toggle('ph-eye'); this.querySelector('i').classList.toggle('ph-eye-slash');">
            <i class="ph ph-eye"></i>
          </button>
        </div>
      </div>

      <a href="./forgot-password.html" class="auth-forgot">Forgot password?</a>

      <button type="submit" class="btn-primary">
        <i class="ph ph-sign-in"></i> Sign In
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="./signup.html">Sign up free</a>
    </p>

  </div>
</div>
