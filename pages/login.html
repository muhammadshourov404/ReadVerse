<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to access your dashboard.</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="forgot-password.html" style="color: var(--accent-color); font-size: 0.9rem; text-decoration: none; font-weight: 500;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="ph ph-sign-in"></i> Log In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </main>
<!-- Confirm password field (signup.html only) -->
<input type="password" id="confirm-password" placeholder="Confirm Password" required />

<!-- Google button (উভয় page-এ) -->
<button type="button" class="google-signin-btn btn-outline">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
       width="18" alt="Google" />
  Continue with Google
</button>
    <script src="../js/components.js"></script>
    
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
