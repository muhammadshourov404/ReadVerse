<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/settings.css"> <link rel="stylesheet" href="../css/support.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container">
        
        <div class="support-header">
            <h1>Get in Touch</h1>
            <p>Have a question, feedback, or need assistance? We're here to help. Reach out to us using the form below.</p>
        </div>

        <div class="contact-grid">
            
            <div class="contact-info">
                <div class="info-item">
                    <i class="ph ph-map-pin"></i>
                    <div>
                        <h4>Headquarters</h4>
                        <p>Tech Valley, Block C<br>Dhaka, Bangladesh</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="ph ph-envelope-simple"></i>
                    <div>
                        <h4>Email Us</h4>
                        <p>support@readverse.com<br>hello@readverse.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="ph ph-phone"></i>
                    <div>
                        <h4>Call Us</h4>
                        <p>+880 1234-567890<br>Mon-Fri, 9am - 6pm</p>
                    </div>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <form>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" placeholder="How can we help?">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Write your message here..."></textarea>
                    </div>
                    <button type="button" class="btn-save" style="width: 100%; justify-content: center;">
                        <i class="ph ph-paper-plane-right"></i> Send Message
                    </button>
                </form>
            </div>

        </div>

    </main>

    <script src="../js/components.js"></script>
</body>
</html>
