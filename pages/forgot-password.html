<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css"> </head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form>
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple"></i>
                        <input type="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <button type="button" class="btn-primary" style="margin-top: 10px;">
                    <i class="ph ph-paper-plane-tilt"></i> Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Log In</a>
            </div>
        </div>
    </main>

    <script src="../js/components.js"></script>
</body>
</html>
