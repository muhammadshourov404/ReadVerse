<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/features.css">
</head>
    <div class="container topics-container">

  <!-- Page header -->
  <div class="topics-header">
    <div>
      <h2>Explore Topics</h2>
      <p class="text-secondary">Follow topics to personalise your reading feed.</p>
    </div>
    <div class="topics-search-wrap">
      <i class="ph ph-magnifying-glass"></i>
      <input type="text" id="topics-search"
             placeholder="Search topics…" class="form-input topics-search-input" />
    </div>
  </div>

  <!-- Tab switcher -->
  <div class="topics-tabs">
    <button id="tab-all-topics" class="topics-tab active">All Topics</button>
    <button id="tab-my-topics"  class="topics-tab">
      My Topics
      <span id="followed-topics-count" class="topics-tab-badge">0</span>
    </button>
  </div>

  <!-- Topics grid -->
  <div id="topics-grid" class="topics-grid"></div>

  <!-- Filtered articles (hidden until a topic is clicked) -->
  <section id="topic-articles-section" style="display:none; margin-top:40px;">
    <h3 id="topic-articles-title" style="margin-bottom:20px;"></h3>
    <div id="topic-articles" class="articles-grid"></div>
  </section>

</div>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container">
        
        <div class="topics-header">
            <h1>Explore Topics</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Dive deep into the subjects that matter to you.</p>
        </div>

        <div class="topics-grid" id="dynamic-topics-grid">
            
            <div class="topic-card" style="pointer-events: none; border-color: transparent; box-shadow: none;">
                <div class="skeleton" style="height: 50px; width: 50px; border-radius: 50%; margin-bottom: 5px;"></div>
                <div class="skeleton" style="height: 20px; width: 70%;"></div>
            </div>
            
            <div class="topic-card" style="pointer-events: none; border-color: transparent; box-shadow: none;">
                <div class="skeleton" style="height: 50px; width: 50px; border-radius: 50%; margin-bottom: 5px;"></div>
                <div class="skeleton" style="height: 20px; width: 80%;"></div>
            </div>

            <div class="topic-card" style="pointer-events: none; border-color: transparent; box-shadow: none;">
                <div class="skeleton" style="height: 50px; width: 50px; border-radius: 50%; margin-bottom: 5px;"></div>
                <div class="skeleton" style="height: 20px; width: 60%;"></div>
            </div>

            <div class="topic-card" style="pointer-events: none; border-color: transparent; box-shadow: none;">
                <div class="skeleton" style="height: 50px; width: 50px; border-radius: 50%; margin-bottom: 5px;"></div>
                <div class="skeleton" style="height: 20px; width: 75%;"></div>
            </div>

        </div>

    </main>

    <script src="../js/components.js"></script>
    <script type="module" src="../js/topics.js"></script>
</body>
</html>
