<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - ReadVerse</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container" style="padding-top: 40px; min-height: calc(100vh - 100px);">
        
        <div style="margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
            <h1 style="font-family: var(--font-serif); font-size: 2.5rem; color: var(--text-primary); display: flex; align-items: center; gap: 15px;">
                <i class="ph ph-bookmark-simple" style="color: var(--accent-color);"></i> Your Bookmarks
            </h1>
            <p style="color: var(--text-secondary); margin-top: 10px;">Articles you have saved to read later.</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-bottom: 50px;">
            
            <div class="article-card">
                <div class="article-meta">
                    <i class="ph ph-user-circle" style="font-size: 1.2rem;"></i>
                    <span>Jane Doe</span>
                    <span>•</span>
                    <span>Sep 28, 2024</span>
                </div>
                <a href="read.html" class="article-title">Mastering Clean Code Principles</a>
                <p class="article-preview">Writing code that machines can understand is easy. Writing code that humans can understand is the real challenge for developers...</p>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 10px;">
                    <a href="read.html" class="read-more-btn" style="margin-top: 0; padding-top: 0;">
                        Read Article <i class="ph ph-arrow-right"></i>
                    </a>
                    <button style="background: none; border: none; color: #DC2626; cursor: pointer; font-size: 1.2rem;" title="Remove Bookmark">
                        <i class="ph ph-bookmark-simple-slash"></i>
                    </button>
                </div>
            </div>

        </div>

    </main>

    <script src="../js/components.js"></script>
</body>
</html>
