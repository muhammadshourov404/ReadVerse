<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReadVerse — Read. Write. Inspire.</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="./css/home.css"/>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <div class="hero-badge">
        <i class="ph ph-sparkle"></i> A place for curious minds
      </div>
      <h1 class="hero-title">
        Where great ideas <span>find their words</span>
      </h1>
      <p class="hero-subtitle">
        Discover thoughtful articles from writers around the world.
        Read deeply. Write boldly.
      </p>
      <div class="hero-actions">
        <a href="./pages/explore.html" class="btn-primary">
          <i class="ph ph-compass"></i> Start Exploring
        </a>
        <a href="./pages/write.html" class="btn-secondary">
          <i class="ph ph-pen-nib"></i> Start Writing
        </a>
      </div>
    </div>
  </section>

  <!-- Main content -->
  <main class="container home-articles-wrap">

    <!-- Trending topics strip -->
    <div class="home-topics-strip" id="home-topics-strip">
      <!-- Populated by topics.js or static tags -->
      <a href="./pages/topics.html?topic=technology" class="tag">Technology</a>
      <a href="./pages/topics.html?topic=science"    class="tag">Science</a>
      <a href="./pages/topics.html?topic=health"     class="tag">Health</a>
      <a href="./pages/topics.html?topic=programming"class="tag">Programming</a>
      <a href="./pages/topics.html?topic=culture"    class="tag">Culture</a>
      <a href="./pages/topics.html"                  class="tag">View All →</a>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <h2 class="section-title">
        <i class="ph ph-trend-up"></i> Latest Articles
      </h2>
      <a href="./pages/explore.html" class="section-link">
        See all <i class="ph ph-arrow-right"></i>
      </a>
    </div>

    <!-- Articles injected by app.js -->
    <div id="articles-grid" class="articles-grid"></div>

    <!-- Load More -->
    <div class="load-more-wrap">
      <button id="load-more-btn" class="btn-secondary">
        Load More <i class="ph ph-arrow-down"></i>
      </button>
    </div>

  </main>

  <!-- Scripts -->
  <script type="module" src="./js/components.js"></script>
  <script type="module" src="./js/app.js"></script>

  <!-- Apply saved theme on load -->
  <script>
    const t = localStorage.getItem('readverse_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
