<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadVerse - Premium Reading Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">

</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container" style="margin-top: 40px;">
        
        <div style="text-align: center; max-width: 600px; margin: 0 auto 60px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 15px; font-family: var(--font-serif); color: var(--text-primary);">Discover stories, thinking, and expertise.</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 30px;">ReadVerse is a minimalist platform for readers and writers. No distractions, just pure content.</p>
            <a href="pages/signup.html" style="background: var(--text-primary); color: white; padding: 12px 24px; border-radius: 30px; text-decoration: none; font-weight: 500; font-size: 1.1rem;">Start Reading</a>
        </div>

        <h3 style="margin-bottom: 20px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;">
            <i class="ph ph-trend-up"></i> Trending Now
        </h3>
        
        <div id="articles-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
            <div style="background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <div class="skeleton" style="height: 20px; width: 40%; margin-bottom: 15px;"></div>
                <div class="skeleton" style="height: 24px; width: 90%; margin-bottom: 10px;"></div>
                <div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 20px;"></div>
                <div class="skeleton" style="height: 15px; width: 30%;"></div>
            </div>
            <div style="background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <div class="skeleton" style="height: 20px; width: 40%; margin-bottom: 15px;"></div>
                <div class="skeleton" style="height: 24px; width: 80%; margin-bottom: 10px;"></div>
                <div class="skeleton" style="height: 24px; width: 60%; margin-bottom: 20px;"></div>
                <div class="skeleton" style="height: 15px; width: 30%;"></div>
            </div>
        </div>

    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script type="module" src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
